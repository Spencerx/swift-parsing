name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

jobs:
  macos:
    name: macOS
    strategy:
      matrix:
        xcode: ["26.2"]
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app
      - name: System
        run: system_profiler SPHardwareDataType
      - name: Build
        run: swift build
      - name: Run tests
        run: swift test

  linux:
    name: Linux
    strategy:
      matrix:
        os: [ubuntu-latest]
        swift:
          - "6.1"
    runs-on: ${{ matrix.os }}
    container: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Run tests
        run: swift test
